name: 💡 Feature Request
description: Suggest a new feature or improvement for Questorr.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Please describe your idea as clearly as possible.

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: Is your feature request related to a problem? What are you trying to achieve?
      placeholder: "I'm always frustrated when... / It would be great if..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe what you'd like to happen. Be as specific as possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      description: Which part of Questorr does this relate to?
      options:
        - Web Dashboard
        - Discord Bot Commands
        - Notifications / Webhooks
        - Channel Routing
        - User Mapping
        - Jellyfin Integration
        - Seerr Integration
        - Mobile / Responsive Design
        - Localization / Language
        - Docker / Deployment
        - Other
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this feature has not been requested before.
          required: true
