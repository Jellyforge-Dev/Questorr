name: 📚 Documentation Issue
description: Report missing, incorrect or unclear documentation.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Found something wrong or missing in the documentation? Let us know!

  - type: dropdown
    id: doc_type
    attributes:
      label: Documentation Type
      options:
        - README (English)
        - README (German)
        - Setup / Configuration Guide
        - Docker / Deployment
        - Code Comments
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What is wrong or missing?
      description: Describe the documentation issue clearly.
      placeholder: "The README says X but it should say Y / There is no documentation for feature Z..."
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested Improvement
      description: How should the documentation be improved?
